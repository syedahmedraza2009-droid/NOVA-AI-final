<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #1a1a3e, #0d0d2b); padding: 15px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2a2a5a; }
        .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .header h1 { font-size: 22px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .model-selector { margin-left: auto; display: flex; gap: 8px; }
        .model-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #6c63ff; background: transparent; color: #fff; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .model-btn.active { background: linear-gradient(135deg, #6c63ff, #3ecfcf); border: none; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .welcome { text-align: center; margin: auto; }
        .welcome h2 { font-size: 32px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .welcome p { color: #888; margin-bottom: 20px; }
        .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .quick-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #2a2a5a; background: #1a1a3e; color: #aaa; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .quick-btn:hover { border-color: #6c63ff; color: #fff; }
        .message { display: flex; gap: 10px; max-width: 80%; }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .message.user .bubble { background: linear-gradient(135deg, #6c63ff, #3ecfcf); color: #fff; }
        .bubble { padding: 12px 16px; border-radius: 18px; background: #1a1a3e; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #3ecfcf); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .thinking { display: flex; gap: 5px; padding: 12px 16px; background: #1a1a3e; border-radius: 18px; width: fit-content; }
        .thinking span { width: 8px; height: 8px; background: #6c63ff; border-radius: 50%; animation: bounce 1.4s infinite; }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .input-area { padding: 15px 20px; background: #0d0d2b; border-top: 1px solid #2a2a5a; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #2a2a5a; background: #1a1a3e; color: #fff; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #6c63ff; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #3ecfcf); border: none; color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">N</div>
        <h1>Nova AI</h1>
        <div class="model-selector">
            <button class="model-btn active" onclick="setModel('groq')" id="groq-btn">⚡ Groq</button>
            <button class="model-btn" onclick="setModel('mistral')" id="mistral-btn">🌟 Mistral</button>
        </div>
    </div>
    <div class="chat-container" id="chat">
        <div class="welcome" id="welcome">
            <h2>✨ Nova AI</h2>
            <p>Aapka smart AI assistant — Urdu aur English mein</p>
            <div class="quick-btns">
                <button class="quick-btn" onclick="sendQuick('Assalamoalaikum')">🕌 Salam</button>
                <button class="quick-btn" onclick="sendQuick('Pakistan ki latest news')">🇵🇰 Pakistan News</button>
                <button class="quick-btn" onclick="sendQuick('Cricket ka news')">🏏 Cricket</button>
                <button class="quick-btn" onclick="sendQuick('World news')">🌍 World News</button>
                <button class="quick-btn" onclick="sendQuick('Business idea do')">💰 Business</button>
                <button class="quick-btn" onclick="sendQuick('Ek joke sunao')">😄 Joke</button>
            </div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Type or speak your message..." onkeypress="if(event.key==='Enter')sendMessage()"/>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <script>
        let currentModel = 'groq';
        function setModel(model) {
            currentModel = model;
            document.getElementById('groq-btn').classList.toggle('active', model === 'groq');
            document.getElementById('mistral-btn').classList.toggle('active', model === 'mistral');
        }
        function sendQuick(text) {
            document.getElementById('input').value = text;
            sendMessage();
        }
        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;
            document.getElementById('welcome')?.remove();
            addMessage(message, 'user');
            input.value = '';
            const thinking = addThinking();
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message, model: currentModel})
                });
                const data = await res.json();
                thinking.remove();
                addMessage(data.response, 'ai');
            } catch {
                thinking.remove();
                addMessage('Error! Dobara try karo.', 'ai');
            }
        }
        function addMessage(text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = type === 'ai' 
                ? `<div class="avatar">✨</div><div class="bubble">${text}</div>`
                : `<div class="bubble">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        function addThinking() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<div class="avatar">✨</div><div class="thinking"><span></span><span></span><span></span></div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
